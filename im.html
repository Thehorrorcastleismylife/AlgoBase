<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отправка практики</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 40px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 40px;
        }

        .header {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        .header-title {
            font-size: 20px;
            color: #333;
            text-align: center;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 40px;
        }

        /* Left Column */
        .assignments-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .assignment-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
        }

        .assignment-title {
            font-size: 14px;
            color: #333;
            margin-bottom: 24px;
        }

        .assignment-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .assignment-date {
            font-size: 14px;
            color: #333;
        }

        .view-details-btn {
            background: #83C36A;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        /* Middle Column */
        .upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .upload-button {
            background: #83C36A;
            color: white;
            border: 2px dashed #558B2F;
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            cursor: pointer;
            width: 100%;
            font-size: 18px;
            line-height: 1.4;
        }

        input[type="file"] {
            display: none;
        }

        .file-info {
            font-size: 14px;
            color: #666;
            text-align: center;
        }

        .submit-btn {
            background: #000000;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        /* Right Column */
        .pdf-preview {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 40px;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pdf-icon {
            background: #83C36A;
            color: white;
            padding: 20px 30px;
            border-radius: 8px;
            font-size: 32px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">Мои задания</div>
            <div class="header-title">Отправить задание</div>
            <div class="header-title">Отчет о практике</div>
        </div>

        <div class="main-content">
            <!-- Left Column -->
            <div class="assignments-list">
                <div class="assignment-card">
                    <div class="assignment-title">Практика</div>
                    <div class="assignment-footer">
                        <div class="assignment-date">02.04.2026</div>
                        <button class="view-details-btn">Просмотреть детали</button>
                    </div>
                </div>

                <div class="assignment-card">
                    <div class="assignment-title">Практика</div>
                    <div class="assignment-footer">
                        <div class="assignment-date">02.04.2026</div>
                        <button class="view-details-btn">Просмотреть детали</button>
                    </div>
                </div>

                <div class="assignment-card">
                    <div class="assignment-title">Практика</div>
                    <div class="assignment-footer">
                        <div class="assignment-date">02.04.2026</div>
                        <button class="view-details-btn">Просмотреть детали</button>
                    </div>
                </div>
            </div>

            <!-- Middle Column -->
            <div class="upload-area">
                <label for="file-upload" class="upload-button">
                    Нажмите для<br>выбора файла<br>отчета о практике
                </label>
                <input type="file" id="file-upload" accept="txt">
                <div class="file-info" id="file-info">Файл не выбран</div>
                <button id="sub" class="submit-btn" onclick>Отправить задание</button>
            </div>

            <!-- Right Column -->
            <div class="pdf-preview">
                <div class="pdf-icon">PDF</div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById("file-upload");
        const fileInfo = document.getElementById("file-info");
        const buttonSub = document.getElementById("sub");

        fileInput.addEventListener("change", () => {
            if (fileInput.files.length === 0) {
                fileInfo.textContent = "Файл не выбран";
            } else {
                fileInfo.textContent = `Выбран файл: ${fileInput.files[0].name}`;
            }
        });

        buttonSub.addEventListener("click", () => {
        const formData = new FormData();
        const file = fileInput.files[0];
        
        if (!file) {
            alert("Выберите файл!");
            return;
        }
        
        formData.append('myfile', file);
        
            fetch('upload.php', {
            method: 'POST',
            body: formData
        })
        .catch(error => console.error("Ошибка:", error));
    });

    </script>
</body>
</html>
